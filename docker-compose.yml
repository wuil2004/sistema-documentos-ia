version: '3.8'

services:
  # 1. Tu servidor Node.js
  backend:
    build: ./backend
    container_name: app_documentos
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
    volumes:
      - ./backend/documentos_guardados:/usr/src/app/documentos_guardados
      - ./backend/historial.json:/usr/src/app/historial.json
    restart: always

  # 2. El Balanceador de Carga (Director de Orquesta)
  nginx:
    image: nginx:alpine
    container_name: nginx_balanceador
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    restart: always