version: '3.8'

services:
  # 🗄️ NUEVO: Base de Datos MongoDB
  mongo:
    image: mongo:latest
    container_name: mongodb_docs
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: always

  # 1. Tu servidor Node.js
  backend:
    build: ./backend
    container_name: app_documentos
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
    volumes:
      - ./backend/documentos_guardados:/usr/src/app/documentos_guardados
    depends_on:
      - mongo
    restart: always

  # 2. El Balanceador de Carga
  nginx:
    image: nginx:alpine
    container_name: nginx_balanceador
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    restart: always

# Le decimos a Docker que guarde los datos de Mongo en el disco duro para no perderlos si se apaga
volumes:
  mongo_data: